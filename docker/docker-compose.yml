
# ─────────────────────────────────────────────────────────────
#  Health Insurance XAI Pipeline — Docker Compose
#  Fixed for macOS Apple Silicon (M1/M2)
#
#  Changes from original:
#  - HDFS port 9000 → 19000 on host (avoids macOS AirPlay conflict)
#  - spark-worker-2 memory: 2g → 1g  (total cluster: ~10.75 GB)
#  - spark services: install shap + sklearn via pip on startup
#  - superset: added db init + admin user creation entrypoint
#  - platform: linux/amd64 on bde2020 images (Rosetta 2 required)
# ─────────────────────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hdfs-namenode
    hostname: hdfs-namenode
    ports:
      - "9870:9870"
      # Port 9000 remapped to 19000 — macOS AirPlay Receiver uses 9000
      - "19000:9000"
    environment:
      CLUSTER_NAME: health-xai-cluster
    env_file:
      - hadoop.env
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: hdfs-datanode
    hostname: hdfs-datanode
    depends_on:
      - hdfs-namenode
    ports:
      - "9864:9864"
    env_file:
      - hadoop.env
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    platform: linux/amd64
    container_name: hive-metastore
    hostname: hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
      hdfs-namenode:
        condition: service_started
    ports:
      - "9083:9083"
    environment:
      SERVICE_PRECONDITION: "hdfs-namenode:9870 postgres:5432"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://postgres:5432/metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive123
      HIVE_SITE_CONF_datanucleus_autoCreateSchema: "false"
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: "hdfs://hdfs-namenode:9000/user/hive/warehouse"
      HIVE_SITE_CONF_hive_metastore_uris: "thrift://hive-metastore:9083"
    env_file:
      - hadoop.env
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  spark-master:
    # apache/spark: official free image (bitnami versioned tags removed Sept 2025)
    build:
      context: spark
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    user: root
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ../spark:/opt/spark-apps
      - ../outputs:/opt/spark-apps/outputs
      - ../data:/opt/spark-data
      - spark_logs:/opt/spark/logs
    command: >
      bash -c "/opt/spark/sbin/start-master.sh &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master.Master-*.out"
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped
  spark-worker-1:
    build:
      context: spark
      dockerfile: Dockerfile
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_WEBUI_PORT: "8081"
    volumes:
      - ../spark:/opt/spark-apps
      - ../outputs:/opt/spark-apps/outputs
      - ../data:/opt/spark-data
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077
      --memory 768M --cores 2 --webui-port 8081 &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker.Worker-*.out"
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped
  spark-worker-2:
    build:
      context: spark
      dockerfile: Dockerfile
    container_name: spark-worker-2
    hostname: spark-worker-2
    user: root
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_WEBUI_PORT: "8081"
    volumes:
      - ../spark:/opt/spark-apps
      - ../outputs:/opt/spark-apps/outputs
      - ../data:/opt/spark-data
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077
      --memory 768M --cores 2 --webui-port 8081 &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker.Worker-*.out"
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped
  airflow-init:
    image: apache/airflow:2.7.2
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFbKI0="
      AIRFLOW__WEBSERVER__SECRET_KEY: "health_xai_secret_key_2024"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin123 --firstname Admin --lastname XAI --role Admin --email admin@healthxai.local"
    restart: on-failure

  airflow-webserver:
    image: apache/airflow:2.7.2
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      - airflow-init
      - postgres
    ports:
      - "8083:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFbKI0="
      AIRFLOW__WEBSERVER__SECRET_KEY: "health_xai_secret_key_2024"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    deploy:
      resources:
        limits:
          memory: 1g
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.7.2
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      - airflow-init
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFbKI0="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    deploy:
      resources:
        limits:
          memory: 1g
    command: scheduler
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.2
    container_name: grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafana123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    deploy:
      resources:
        limits:
          memory: 256m
    restart: unless-stopped

  superset:
    image: apache/superset:3.0.0
    container_name: superset
    hostname: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "health_xai_superset_secret_2024"
    volumes:
      - superset_data:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
    # Initialize DB + create admin user on first start
    command: >
      bash -c "superset db upgrade &&
               superset fab create-admin
                 --username admin
                 --firstname Admin
                 --lastname XAI
                 --email admin@healthxai.local
                 --password admin123 || true &&
               superset init &&
               superset run -p 8088 --with-threads --reload --debugger"
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  hdfs_namenode:
  hdfs_datanode:
  postgres_data:
  spark_logs:
  airflow_logs:
  grafana_data:
  superset_data:

networks:
  default:
    name: health-xai-net
    driver: bridge
